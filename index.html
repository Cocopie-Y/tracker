--pink: #d89aae;
--pink-surface: rgba(249, 215, 228, 0.5);
--pink-soft: rgba(216, 154, 174, 0.1);

--purple: #a595c4;
--purple-surface: rgba(225, 215, 245, 0.5);
--purple-soft: rgba(165, 149, 196, 0.1);

--blue: #8ca7c9;
--blue-surface: rgba(210, 225, 245, 0.5);
--blue-soft: rgba(140, 167, 201, 0.1);

--yellow: #d0b070;
--yellow-surface: rgba(252, 240, 205, 0.5);
--yellow-soft: rgba(208, 176, 112, 0.1);

--sage: #8fa886;
--sage-surface: rgba(220, 235, 210, 0.5);
--sage-soft: rgba(143, 168, 134, 0.1);

--coral: #d2887a;
--coral-surface: rgba(250, 218, 210, 0.5);
--coral-soft: rgba(210, 136, 122, 0.1);

--shadow-sm: 0 1px 2px rgba(80, 60, 90, 0.04), 0 2px 10px rgba(80, 60, 90, 0.03);
--shadow-md: 0 4px 16px rgba(80, 60, 90, 0.06), 0 8px 32px rgba(80, 60, 90, 0.04);

}

- { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

html, body {
margin: 0; padding: 0;
font-family: var(–font); color: var(–text);
font-weight: 400;
-webkit-font-smoothing: antialiased;
-moz-osx-font-smoothing: grayscale;
}

body {
background:
radial-gradient(ellipse 100% 70% at 10% 10%, rgba(249, 212, 225, 0.6) 0%, transparent 55%),
radial-gradient(ellipse 70% 50% at 90% 15%, rgba(205, 220, 248, 0.55) 0%, transparent 55%),
radial-gradient(ellipse 90% 60% at 55% 45%, rgba(225, 210, 245, 0.5) 0%, transparent 60%),
radial-gradient(ellipse 80% 60% at 25% 90%, rgba(252, 240, 205, 0.55) 0%, transparent 55%),
radial-gradient(ellipse 75% 55% at 90% 85%, rgba(235, 220, 248, 0.45) 0%, transparent 55%),
var(–bg);
background-attachment: fixed;
min-height: 100vh;
}

.app { max-width: 480px; margin: 0 auto; padding-bottom: 100px; }

.num { font-feature-settings: “tnum” 1; letter-spacing: -0.01em; }

.icon { display: inline-block; vertical-align: middle; flex-shrink: 0; }
.icon-stroke { stroke-linecap: round; stroke-linejoin: round; }

/* ───── HEADER ───── */
.header {
position: sticky; top: 0; z-index: 20;
background: rgba(253, 252, 251, 0.78);
backdrop-filter: blur(26px) saturate(1.4);
-webkit-backdrop-filter: blur(26px) saturate(1.4);
border-bottom: 1px solid var(–border);
padding: 16px 20px 12px;
}
.brand-row { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 2px; }
.brand {
font-weight: 600; font-size: 19px;
letter-spacing: -0.02em; color: var(–text);
}
.brand .soft { font-weight: 300; color: var(–text-soft); }
.controls { display: flex; gap: 8px; align-items: center; }
.save-status {
font-size: 11px; color: var(–sage); font-weight: 500;
opacity: 0; transition: opacity .3s;
display: flex; align-items: center; gap: 4px;
}
.reset-btn {
display: flex; align-items: center; gap: 4px;
background: rgba(255,255,255,0.55); color: var(–text-soft);
border: 1px solid var(–border); border-radius: 999px;
padding: 5px 9px; font-size: 10px; cursor: pointer;
font-family: inherit; font-weight: 500;
white-space: nowrap;
}

/* ───── TABS ───── */
.tabs {
display: flex; gap: 3px; margin-top: 12px;
background: rgba(255,255,255,0.4);
border: 1px solid var(–border);
border-radius: 12px; padding: 3px;
}
.tab {
flex: 1; padding: 9px 0; border-radius: 10px; border: none;
font-family: inherit; font-size: 13px; font-weight: 500;
background: transparent; color: var(–text-soft); cursor: pointer;
display: flex; align-items: center; justify-content: center; gap: 6px;
transition: all .2s;
letter-spacing: 0.01em;
}
.tab.active { background: rgba(255,255,255,0.95); color: var(–text); box-shadow: var(–shadow-sm); font-weight: 600; }
.tab-badge {
font-size: 10px; background: var(–purple); color: #fff;
padding: 1px 6px; border-radius: 999px; font-weight: 600; margin-left: 2px;
}
.tab.active .tab-badge { background: var(–purple); }
.tab:not(.active) .tab-badge { background: var(–text-faint); }

/* ───── MODE TOGGLE ───── */
.mode-toggle {
display: flex; gap: 3px; margin-top: 10px; margin-bottom: 12px;
background: rgba(255,255,255,0.4);
border: 1px solid var(–border);
border-radius: 12px; padding: 3px;
}
.mode-btn {
flex: 1; padding: 7px 0; border-radius: 10px; border: none;
font-family: inherit; font-size: 12px; font-weight: 500;
background: transparent; color: var(–text-faint); cursor: pointer;
display: flex; align-items: center; justify-content: center; gap: 6px;
transition: all .2s;
}
.mode-btn.active { background: rgba(255,255,255,0.95); box-shadow: var(–shadow-sm); }
.mode-btn.active.deep { color: var(–coral); }
.mode-btn.active.avg { color: var(–blue); }

/* ───── SUMMARY CARDS ───── */
.summary-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; }
.summary-card {
background: rgba(255,255,255,0.55);
border: 1px solid var(–border);
border-radius: 14px; padding: 9px 11px;
backdrop-filter: blur(12px);
-webkit-backdrop-filter: blur(12px);
}
.summary-label {
font-size: 10px; color: var(–text-soft); font-weight: 500;
display: flex; align-items: center; gap: 4px;
text-transform: uppercase; letter-spacing: 0.05em;
}
.summary-value {
font-size: 18px; font-weight: 700;
margin-top: 3px; letter-spacing: -0.02em;
line-height: 1.1;
}
.summary-sub { font-size: 10px; color: var(–text-faint); margin-top: 2px; font-weight: 300; }
.v-sage { color: var(–sage); }
.v-yellow { color: var(–yellow); }
.v-coral { color: var(–coral); }
.v-pink { color: var(–pink); }
.v-purple { color: var(–purple); }
.v-blue { color: var(–blue); }

/* ───── CARDS ───── */
.card {
background: rgba(255,255,255,0.62);
backdrop-filter: blur(22px) saturate(1.3);
-webkit-backdrop-filter: blur(22px) saturate(1.3);
border: 1px solid var(–border);
margin: 14px 12px; border-radius: 20px;
box-shadow: var(–shadow-sm);
overflow: hidden;
}
.card-pad { padding: 18px; }
.section-title {
font-size: 16px; font-weight: 600;
letter-spacing: -0.01em; display: flex; align-items: center; gap: 8px;
margin-bottom: 14px; color: var(–text);
}

/* ───── SALARY BOX ───── */
.salary-box {
display: flex; align-items: center; gap: 12px; padding: 14px 16px;
background: linear-gradient(135deg, var(–yellow-surface), rgba(252, 240, 205, 0.3));
border: 1px solid rgba(208, 176, 112, 0.22);
border-radius: 14px; margin-bottom: 14px;
}
.salary-icon-box {
width: 38px; height: 38px; border-radius: 12px;
background: rgba(255,255,255,0.55); color: var(–yellow);
display: flex; align-items: center; justify-content: center;
}
.salary-label {
font-size: 10px; color: var(–text-soft); font-weight: 500;
text-transform: uppercase; letter-spacing: 0.08em;
}
.salary-main { flex: 1; min-width: 0; }
.salary-value { font-size: 21px; font-weight: 700; color: var(–text); letter-spacing: -0.02em; line-height: 1.1; }
.salary-input {
width: 100%; border: none; background: transparent;
font-family: inherit; font-size: 21px; font-weight: 700;
color: var(–text); letter-spacing: -0.02em;
padding: 0; outline: none;
}
.salary-edit-btn {
background: rgba(255,255,255,0.7); border: 1px solid var(–border);
color: var(–text-soft); border-radius: 999px;
padding: 6px 11px; font-size: 11px; cursor: pointer; font-family: inherit;
display: flex; align-items: center; gap: 4px; font-weight: 500;
}

.budget-info {
font-size: 12px; color: var(–text-soft); margin-bottom: 12px;
display: flex; flex-wrap: wrap; gap: 10px; align-items: center;
}
.budget-info .v { font-weight: 600; }
.bar {
height: 6px; border-radius: 999px;
background: rgba(170, 160, 180, 0.15);
display: flex; overflow: hidden; margin-bottom: 16px;
}
.bar-seg { transition: width .4s ease; }

/* ───── BREAKDOWN BARS ───── */
.breakdown { margin-top: 8px; }
.breakdown-item {
display: flex; align-items: center; gap: 10px; margin-bottom: 10px;
}
.breakdown-bar-wrap {
flex: 1;
}
.breakdown-top {
display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 4px;
}
.breakdown-label {
font-size: 12px; font-weight: 500; color: var(–text);
display: flex; align-items: center; gap: 6px;
}
.breakdown-percent {
font-size: 11px; color: var(–text-soft); font-weight: 500;
}
.breakdown-amount {
font-size: 13px; font-weight: 700; color: var(–text);
}
.breakdown-bar {
height: 8px; border-radius: 999px;
background: rgba(170, 160, 180, 0.12);
overflow: hidden;
}
.breakdown-fill {
height: 100%; border-radius: 999px;
transition: width .5s cubic-bezier(0.4, 0, 0.2, 1);
}
.breakdown-icon {
width: 32px; height: 32px; border-radius: 10px;
display: flex; align-items: center; justify-content: center;
flex-shrink: 0;
}

/* ───── FIXED EXPENSES ───── */
.section-sub {
font-size: 10px; color: var(–text-soft); margin-bottom: 6px;
text-transform: uppercase; letter-spacing: 0.1em; font-weight: 500;
}
.fixed-row {
display: flex; align-items: center; gap: 10px; padding: 8px 0;
border-bottom: 1px solid var(–border);
}
.fixed-row:last-of-type { border-bottom: none; }
.dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
.fixed-name { flex: 1; font-size: 13px; color: var(–text); font-weight: 400; }
.fixed-name-input {
flex: 1; font-size: 13px; color: var(–text); font-weight: 400;
border: 1px solid transparent; background: transparent;
border-radius: 6px; padding: 5px 8px; font-family: inherit;
min-width: 0; outline: none; transition: all .15s;
}
.fixed-name-input:focus { background: rgba(255,255,255,0.9); border-color: var(–border-strong); }
.fixed-input {
width: 80px; text-align: right; border: 1px solid transparent;
background: rgba(255,255,255,0.5);
border-radius: 8px; padding: 6px 10px;
font-family: inherit; font-size: 14px; font-weight: 600;
transition: all .15s; outline: none;
}
.fixed-input:focus { background: rgba(255,255,255,0.95); border-color: var(–border-strong); }
.currency { font-size: 11px; color: var(–text-faint); font-weight: 300; }
.x-btn {
background: none; border: none; cursor: pointer; color: var(–text-faint);
padding: 4px; display: flex; align-items: center; justify-content: center;
border-radius: 6px;
}
.x-btn:active { background: rgba(170, 160, 180, 0.15); color: var(–coral); }

.add-fixed-btn, .add-item-btn {
margin-top: 10px; background: none;
border: 1px dashed var(–border-strong); border-radius: 10px;
padding: 10px; cursor: pointer; font-size: 12px; color: var(–text-soft);
font-family: inherit; width: 100%;
display: flex; align-items: center; justify-content: center; gap: 6px;
font-weight: 500;
}
.add-item-btn {
margin: 10px 14px;
background: linear-gradient(135deg, rgba(255,255,255,0.5), rgba(255,255,255,0.25));
border: 1px dashed var(–purple);
color: var(–purple);
}
.add-form { display: flex; gap: 6px; margin-top: 10px; align-items: center; }
.text-input {
border: 1px solid var(–border-strong); border-radius: 8px;
padding: 7px 10px; font-size: 13px; font-family: inherit;
background: rgba(255,255,255,0.75); outline: none;
}
.text-input:focus { background: #fff; border-color: var(–yellow); }
.btn-confirm {
background: var(–sage); color: #fff; border: none; border-radius: 8px;
padding: 7px 12px; cursor: pointer; font-size: 13px; font-weight: 600; font-family: inherit;
display: flex; align-items: center; justify-content: center;
}
.btn-dismiss {
background: rgba(170, 160, 180, 0.15); color: var(–text-soft);
border: none; border-radius: 8px;
padding: 7px 10px; cursor: pointer; font-family: inherit;
display: flex; align-items: center; justify-content: center;
}

.two-col { margin-top: 16px; display: flex; gap: 10px; }
.two-col > div { flex: 1; }
.field-label {
font-size: 10px; color: var(–text-soft); font-weight: 500;
text-transform: uppercase; letter-spacing: 0.08em;
display: flex; align-items: center; gap: 5px; margin-bottom: 5px;
}
.field-input {
width: 100%; border: 1px solid var(–border);
background: rgba(255,255,255,0.55);
border-radius: 10px; padding: 8px 12px;
font-family: inherit; font-size: 15px; font-weight: 600;
text-align: right; outline: none;
}
.field-input:focus { background: #fff; border-color: var(–border-strong); }

.net-box {
margin-top: 16px; padding: 14px 16px; border-radius: 14px;
display: flex; justify-content: space-between; align-items: center;
border: 1px solid;
}
.net-box.pos { background: var(–sage-surface); border-color: rgba(143, 168, 134, 0.3); }
.net-box.neg { background: var(–coral-surface); border-color: rgba(210, 136, 122, 0.3); }
.net-label {
font-size: 11px; font-weight: 500; color: var(–text-soft);
text-transform: uppercase; letter-spacing: 0.08em;
display: flex; align-items: center; gap: 6px;
}
.net-value { font-size: 24px; font-weight: 700; letter-spacing: -0.02em; }
.net-value.pos { color: var(–sage); }
.net-value.neg { color: var(–coral); }

/* ───── CATEGORY ───── */
.cat-header { padding: 16px 18px; border-bottom: 1px solid var(–border); }
.cat-header.should { background: linear-gradient(135deg, rgba(225, 240, 215, 0.5), rgba(225, 240, 215, 0.15)); }
.cat-header.nice { background: linear-gradient(135deg, var(–yellow-surface), rgba(252, 240, 205, 0.2)); }
.cat-header.big { background: linear-gradient(135deg, var(–pink-surface), rgba(249, 215, 228, 0.2)); }
.cat-title-row { display: flex; justify-content: space-between; align-items: center; gap: 8px; }
.cat-title-wrap { display: flex; align-items: center; gap: 10px; flex: 1; min-width: 0; }
.cat-icon-box {
width: 36px; height: 36px; border-radius: 11px;
display: flex; align-items: center; justify-content: center;
background: rgba(255,255,255,0.65); flex-shrink: 0;
}
.cat-icon-box.should { color: var(–sage); }
.cat-icon-box.nice { color: var(–yellow); }
.cat-icon-box.big { color: var(–pink); }
.cat-title {
font-size: 15px; font-weight: 600;
letter-spacing: -0.01em; color: var(–text);
}
.cat-desc { font-size: 11px; color: var(–text-soft); margin-top: 1px; font-weight: 300; }
.cat-actions { display: flex; gap: 6px; flex-shrink: 0; }
.cat-btn {
background: rgba(255,255,255,0.6); border: 1px solid var(–border-strong);
border-radius: 999px; padding: 5px 10px;
font-size: 11px; font-weight: 500; cursor: pointer; font-family: inherit;
display: flex; align-items: center; gap: 4px;
color: var(–text-soft);
}
.cat-btn:active { background: rgba(255,255,255,0.9); }
.cat-btn.edit-on { background: var(–purple); color: #fff; border-color: var(–purple); }
.cat-btn.all-checked { background: var(–sage); color: #fff; border-color: var(–sage); }

.cat-totals {
display: flex; gap: 14px; margin-top: 12px; font-size: 11px; color: var(–text-soft);
flex-wrap: wrap;
}
.cat-totals .v { font-weight: 600; font-size: 12px; }
.cat-totals .v.deep { color: var(–coral); }
.cat-totals .v.avg { color: var(–blue); }
.cat-totals-sel {
display: flex; gap: 14px; margin-top: 4px; font-size: 11px;
color: var(–sage); font-weight: 500;
flex-wrap: wrap;
}

.edit-banner {
margin: 0 14px 8px; padding: 8px 12px;
background: var(–purple-soft);
border: 1px solid rgba(165, 149, 196, 0.3);
border-radius: 10px;
font-size: 11px; color: var(–purple); font-weight: 500;
display: flex; align-items: center; gap: 6px;
}

/* ───── ITEMS ───── */
.items { padding: 6px 10px; }
.item {
display: flex; align-items: center; gap: 12px; padding: 12px;
border-radius: 12px; cursor: pointer; transition: all .15s;
border: 1px solid transparent;
}
.item.checked { background: var(–sage-soft); border-color: rgba(143, 168, 134, 0.25); }
.item:not(.checked):active { background: rgba(170, 160, 180, 0.06); }
.item.edit-mode { background: rgba(255,255,255,0.35); border-color: var(–border); }
.item.edit-mode:active { background: rgba(255,255,255,0.7); }
.checkbox {
width: 22px; height: 22px; border-radius: 7px; flex-shrink: 0;
border: 1.5px solid var(–border-strong);
background: rgba(255,255,255,0.5);
display: flex; align-items: center; justify-content: center;
transition: all .15s; color: transparent;
}
.checkbox.checked { background: var(–sage); border-color: var(–sage); color: #fff; }
.edit-handle {
width: 22px; height: 22px; flex-shrink: 0; color: var(–purple);
display: flex; align-items: center; justify-content: center;
}
.item-main { flex: 1; min-width: 0; }
.item-name { font-size: 14px; font-weight: 400; color: var(–text); word-break: break-word; }
.item-note { font-size: 11px; color: var(–text-faint); margin-top: 2px; font-weight: 300; }
.item-right { text-align: right; flex-shrink: 0; }
.item-price {
font-size: 15px; font-weight: 600;
display: inline-flex; align-items: center; gap: 5px;
padding: 3px 8px; border-radius: 8px;
color: var(–text); transition: all .15s;
}
.item.checked .item-price { color: var(–sage); }
.item-price:active { background: rgba(170, 160, 180, 0.15); }
.item-price .edit-icon { opacity: 0.35; color: var(–text-soft); }
.item-price.edited::before {
content: “”; display: inline-block;
width: 5px; height: 5px; border-radius: 50%;
background: var(–yellow); margin-right: 3px;
}
.item-alt-price { font-size: 10px; color: var(–text-faint); margin-top: 1px; font-weight: 400; }

/* ───── BUY BUTTON ───── */
.buy-btn-wrap {
padding: 8px 14px 14px;
}
.buy-btn {
width: 100%; padding: 12px; border: none; border-radius: 12px;
background: linear-gradient(135deg, var(–sage), #7d9674);
color: #fff; font-family: inherit; font-size: 14px; font-weight: 600;
cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 8px;
box-shadow: 0 2px 8px rgba(143, 168, 134, 0.3);
transition: all .15s;
}
.buy-btn:active { transform: translateY(1px); }
.buy-btn:disabled {
background: rgba(170, 160, 180, 0.2); color: var(–text-faint);
box-shadow: none; cursor: not-allowed;
}

/* ───── HISTORY ───── */
.history-empty {
text-align: center; padding: 48px 24px;
color: var(–text-faint); font-weight: 300;
}
.history-empty-icon {
width: 60px; height: 60px; margin: 0 auto 16px;
border-radius: 50%; background: var(–purple-soft);
display: flex; align-items: center; justify-content: center;
color: var(–purple);
}
.history-empty-title {
font-size: 15px; font-weight: 600; color: var(–text); margin-bottom: 4px;
}
.history-empty-desc { font-size: 13px; }

.history-batch {
background: rgba(255,255,255,0.62);
backdrop-filter: blur(22px) saturate(1.3);
-webkit-backdrop-filter: blur(22px) saturate(1.3);
border: 1px solid var(–border);
margin: 14px 12px; border-radius: 20px;
box-shadow: var(–shadow-sm);
overflow: hidden;
}
.batch-header {
padding: 14px 16px; border-bottom: 1px solid var(–border);
background: linear-gradient(135deg, var(–purple-surface), rgba(225, 215, 245, 0.2));
}
.batch-header-top {
display: flex; justify-content: space-between; align-items: center; gap: 10px;
}
.batch-date {
font-size: 13px; font-weight: 600; color: var(–text);
display: flex; align-items: center; gap: 6px;
}
.batch-time { font-size: 11px; color: var(–text-soft); font-weight: 400; }
.batch-restore-all {
background: var(–coral); color: #fff; border: none;
border-radius: 999px; padding: 6px 11px;
font-size: 11px; font-weight: 600; cursor: pointer; font-family: inherit;
display: flex; align-items: center; gap: 4px; flex-shrink: 0;
}
.batch-stats {
display: flex; gap: 14px; margin-top: 8px;
font-size: 11px; color: var(–text-soft);
}
.batch-stats .v { font-weight: 600; color: var(–text); }

.history-item {
display: flex; align-items: center; gap: 12px; padding: 12px 14px;
border-bottom: 1px solid var(–border);
}
.history-item:last-child { border-bottom: none; }
.history-item-main { flex: 1; min-width: 0; }
.history-item-name { font-size: 13px; font-weight: 400; color: var(–text); }
.history-item-note { font-size: 11px; color: var(–text-faint); margin-top: 1px; font-weight: 300; }
.history-item-price {

      for (const oldKey of OLD_KEYS) {
        const oldData = localStorage.getItem(oldKey);
        if (oldData) {
          raw = oldData;
          localStorage.setItem(STORAGE_KEY, oldData);
          console.log(`กู้ข้อมูลจาก ${oldKey} มาสู่ ${STORAGE_KEY} แล้ว`);
          break;
        }
      }
    }

    if (!raw) return;
    const s = JSON.parse(raw);
    if (s.tab) state.tab = s.tab;
    if (s.items && Array.isArray(s.items)) state.items = s.items;
    if (s.selected) state.selected = s.selected;
    if (s.priceMode) state.priceMode = s.priceMode;
    if (s.fixed) state.fixed = s.fixed;
    if (typeof s.savings === "number") state.savings = s.savings;
    if (typeof s.emergency === "number") state.emergency = s.emergency;
    if (typeof s.salary === "number") state.salary = s.salary;
    if (s.purchases && Array.isArray(s.purchases)) state.purchases = s.purchases;
  } catch (e) { console.warn("Load error:", e); }
}

// EXPORT / IMPORT
// ═══════════════════════════════════════════════════════════════════
function exportData() {
  try {
    const data = {
      version: "shopping-tracker-1.0",
      exportedAt: new Date().toISOString(),
      items: state.items, selected: state.selected, priceMode: state.priceMode,
      fixed: state.fixed, savings: state.savings, emergency: state.emergency,
      salary: state.salary, purchases: state.purchases,
    };
    const blob = new Blob([JSON.stringify(data, null, 2)], { type: "application/json" });
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a");
    const today = new Date().toISOString().slice(0, 10);
    a.href = url;
    a.download = `shopping-tracker-backup-${today}.json`;
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    URL.revokeObjectURL(url);
    showSaveStatus();
  } catch (e) {
    alert("สำรองข้อมูลไม่สำเร็จ: " + e.message);
  }
}

function triggerImport() {
  const input = document.createElement("input");
  input.type = "file";
  input.accept = ".json,application/json";
  input.onchange = (e) => {
    const file = e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = (ev) => {
      try {
        const s = JSON.parse(ev.target.result);
        if (!s.items || !Array.isArray(s.items)) throw new Error("ไฟล์ไม่ถูกต้อง");
        pendingImport = s;
        state.modal = { type: 'confirmImport' };
        renderModal();
      } catch (err) {
        alert("นำเข้าไฟล์ไม่ได้: " + err.message);
      }
    };
    reader.readAsText(file);
  };
  input.click();
}

let pendingImport = null;
function doImportConfirmed() {
  if (!pendingImport) return;
  const data = pendingImport;
  if (data.items) state.items = data.items;
  if (data.selected) state.selected = data.selected;
  if (data.priceMode) state.priceMode = data.priceMode;
  if (data.fixed) state.fixed = data.fixed;
  if (typeof data.savings === "number") state.savings = data.savings;
  if (typeof data.emergency === "number") state.emergency = data.emergency;
  if (typeof data.salary === "number") state.salary = data.salary;
  if (data.purchases) state.purchases = data.purchases;
  pendingImport = null;
  state.modal = null;
  renderModal(); renderApp(); save();
}

let saveTimer = null;
function saveDebounced() { clearTimeout(saveTimer); saveTimer = setTimeout(save, 300); }

let statusTimer = null;
function showSaveStatus() {
  const el = document.getElementById("save-status");
  if (!el) return;
  el.style.opacity = 1;
  clearTimeout(statusTimer);
  statusTimer = setTimeout(() => { el.style.opacity = 0; }, 1500);
}

const fmt = n => n.toLocaleString("th-TH");
const esc = s => String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));

function isItemEdited(item) {
  const def = DEFAULT_ITEMS.find(d => d.id === item.id);
  if (!def) return true;
  return def.deep !== item.deep || def.avg !== item.avg || def.name !== item.name;
}

function nextId() { return Math.max(0, ...state.items.map(i => i.id), 0) + 1; }

function formatDate(iso) {
  const d = new Date(iso);
  const months = ["ม.ค.","ก.พ.","มี.ค.","เม.ย.","พ.ค.","มิ.ย.","ก.ค.","ส.ค.","ก.ย.","ต.ค.","พ.ย.","ธ.ค."];
  return `${d.getDate()} ${months[d.getMonth()]} ${d.getFullYear() + 543}`;
}
function formatTime(iso) {
  const d = new Date(iso);
  const h = d.getHours().toString().padStart(2, "0");
  const m = d.getMinutes().toString().padStart(2, "0");
  return `${h}:${m} น.`;
}

// ACTIONS

function setTab(t) { state.tab = t; renderApp(); saveDebounced(); }

function toggle(id) {
  const i = state.selected.indexOf(id);
  if (i >= 0) state.selected.splice(i, 1); else state.selected.push(id);
  renderApp(); saveDebounced();
}
function selectAllInCat(cat) {
  const ids = state.items.filter(i => i.cat === cat).map(i => i.id);
  const allChecked = ids.every(id => state.selected.includes(id));
  if (allChecked) state.selected = state.selected.filter(id => !ids.includes(id));
  else ids.forEach(id => { if (!state.selected.includes(id)) state.selected.push(id); });
  renderApp(); saveDebounced();
}
function setMode(m) { state.priceMode = m; renderApp(); saveDebounced(); }
function setSalary(v) { state.salary = Math.max(0, +v || 0); renderApp(); saveDebounced(); }
function toggleSalaryEdit() { state.editingSalary = !state.editingSalary; renderApp(); }
function updateFixed(id, amt) {
  const f = state.fixed.find(x => x.id === id);
  if (f) { f.amount = Math.max(0, +amt || 0); renderApp(); saveDebounced(); }
}
function updateFixedName(id, name) {
  const f = state.fixed.find(x => x.id === id);
  if (f && name.trim()) { f.name = name.trim(); renderApp(); saveDebounced(); }
}
function removeFixed(id) { state.fixed = state.fixed.filter(x => x.id !== id); renderApp(); saveDebounced(); }
function addFixedSubmit() {

  const amtEl = document.getElementById('new-fixed-amt');

}
function setSavings(v) { state.savings = Math.max(0, +v || 0); renderApp(); saveDebounced(); }
function setEmergency(v) { state.emergency = Math.max(0, +v || 0); renderApp(); saveDebounced(); }
function toggleAddFixed() { state.showAddFixed = !state.showAddFixed; renderApp(); }

function toggleCatEdit(cat) { state.editingCat = (state.editingCat === cat) ? null : cat; renderApp(); }

// ── Buy action ──
function buyItemsInCat(cat) {
  const ids = state.items.filter(i => i.cat === cat && state.selected.includes(i.id)).map(i => i.id);
  if (ids.length === 0) return;
  const items = state.items.filter(i => ids.includes(i.id));
  state.modal = {
    type: 'confirmBuy',
    items: items.map(i => ({
      name: i.name, note: i.note, cat: i.cat, originalId: i.id,
      price: state.priceMode === 'deep' ? i.deep : i.avg,
    })),
    cat,
  };
  renderModal();
}

function confirmBuyNow() {
  if (!state.modal || state.modal.type !== 'confirmBuy') return;
  const batch = {
    id: 'p' + Date.now(),
    date: new Date().toISOString(),
    priceMode: state.priceMode,
    items: state.modal.items,
  };
  state.purchases.unshift(batch);
  // remove from items list
  const boughtIds = state.modal.items.map(i => i.originalId);
  state.items = state.items.filter(i => !boughtIds.includes(i.id));
  state.selected = state.selected.filter(id => !boughtIds.includes(id));
  state.modal = null;
  renderModal(); renderApp(); saveDebounced();
}

// ── Restore ──
function restoreBatch(batchId) {
  const batch = state.purchases.find(p => p.id === batchId);
  if (!batch) return;
  state.modal = {
    type: 'confirmRestoreBatch',
    batchId,
    itemCount: batch.items.length,
    date: batch.date,
  };
  renderModal();
}

function doRestoreBatch(batchId) {
  const batch = state.purchases.find(p => p.id === batchId);
  if (!batch) { state.modal = null; renderModal(); return; }

  // restore each item back to main list
  batch.items.forEach(it => {
    const def = DEFAULT_ITEMS.find(d => d.id === it.originalId);
    const existing = state.items.find(i => i.id === it.originalId);
    if (existing) return; // already there
    const id = def ? it.originalId : nextId();
    const priceField = batch.priceMode === 'deep' ? 'deep' : 'avg';
    const other = def ? (batch.priceMode === 'deep' ? def.avg : def.deep) : it.price;
    state.items.push({
      id, name: it.name, cat: it.cat, note: it.note || '',
      [priceField]: it.price,
      [priceField === 'deep' ? 'avg' : 'deep']: other,
    });
  });
  state.purchases = state.purchases.filter(p => p.id !== batchId);
  state.modal = null;
  renderModal(); renderApp(); saveDebounced();
}

function restoreOneItem(batchId, originalId) {
  const batch = state.purchases.find(p => p.id === batchId);
  if (!batch) return;
  const it = batch.items.find(i => i.originalId === originalId);
  if (!it) return;

  const def = DEFAULT_ITEMS.find(d => d.id === it.originalId);
  const existing = state.items.find(i => i.id === it.originalId);
  if (!existing) {
    const id = def ? it.originalId : nextId();
    const priceField = batch.priceMode === 'deep' ? 'deep' : 'avg';
    const other = def ? (batch.priceMode === 'deep' ? def.avg : def.deep) : it.price;
    state.items.push({
      id, name: it.name, cat: it.cat, note: it.note || '',
      [priceField]: it.price,
      [priceField === 'deep' ? 'avg' : 'deep']: other,
    });
  }

  batch.items = batch.items.filter(i => i.originalId !== originalId);
  if (batch.items.length === 0) {
    state.purchases = state.purchases.filter(p => p.id !== batchId);
  }
  renderApp(); saveDebounced();
}

  renderModal();
}
function openItemEdit(itemId, e) {

  renderModal();
}
function openAddItem(cat) {
  state.modal = { type: 'full', itemId: null, cat };
  renderModal();
}
function closeModal() { state.modal = null; renderModal(); }

function saveModal() {
  if (!state.modal) return;
  const m = state.modal;

  if (m.type === 'price') {
    const deepEl = document.getElementById('edit-deep');
    const avgEl = document.getElementById('edit-avg');
    const item = state.items.find(i => i.id === m.itemId);
    if (item && deepEl && avgEl) {
      item.deep = Math.max(0, +deepEl.value || 0);
      item.avg = Math.max(0, +avgEl.value || 0);
    }
  } else if (m.type === 'full') {
    const nameEl = document.getElementById('edit-name');
    const deepEl = document.getElementById('edit-deep');
    const avgEl = document.getElementById('edit-avg');
    const noteEl = document.getElementById('edit-note');
    if (!nameEl || !nameEl.value.trim()) { alert('กรุณาใส่ชื่อรายการ'); return; }
    const data = {
      name: nameEl.value.trim(),
      deep: Math.max(0, +deepEl.value || 0),
      avg: Math.max(0, +avgEl.value || 0),
      note: noteEl.value.trim(),
    };
    if (m.itemId == null) {
      state.items.push({ id: nextId(), ...data, cat: m.cat });
    } else {
      const item = state.items.find(i => i.id === m.itemId);
      if (item) Object.assign(item, data);
    }
  }
  state.modal = null;
  renderModal(); renderApp(); saveDebounced();
}

function deleteItemFromModal() {
  if (!state.modal || state.modal.itemId == null) return;
  const item = state.items.find(i => i.id === state.modal.itemId);
  if (!item) return;
  state.modal = { type: 'confirmDeleteItem', itemId: item.id, itemName: item.name };
  renderModal();
}

function doDeleteItem(itemId) {
  state.items = state.items.filter(i => i.id !== itemId);
  state.selected = state.selected.filter(id => id !== itemId);
  state.modal = null;
  renderModal(); renderApp(); saveDebounced();
}

function resetPriceInForm() {
  if (!state.modal || state.modal.itemId == null) return;
  const def = DEFAULT_ITEMS.find(d => d.id === state.modal.itemId);
  if (!def) return;
  const nameEl = document.getElementById('edit-name');
  const deepEl = document.getElementById('edit-deep');
  const avgEl = document.getElementById('edit-avg');

  if (nameEl) nameEl.value = def.name;

    fixed: DEFAULT_FIXED.map(x => ({ ...x })), savings: 0, emergency: 0, salary: 24000,

// ═══════════════════════════════════════════════════════════════════
// COMPUTED
// ═══════════════════════════════════════════════════════════════════
function compute() {
  const shopSpend = state.items.filter(i => state.selected.includes(i.id))
    .reduce((s, i) => s + (state.priceMode === "deep" ? i.deep : i.avg), 0);
  const fixedTotal = state.fixed.reduce((s, f) => s + f.amount, 0);
  const totalSpend = fixedTotal + state.savings + state.emergency + shopSpend;
  return { shopSpend, fixedTotal, totalSpend, remaining: state.salary - totalSpend };
}
function catTotals() {
  const out = {};
  ["should", "nice", "big"].forEach(c => {
    const items = state.items.filter(i => i.cat === c);
    const sel = items.filter(i => state.selected.includes(i.id));
    out[c] = {
      count: items.length, selCount: sel.length,
      deepAll: items.reduce((s, i) => s + i.deep, 0),
      avgAll: items.reduce((s, i) => s + i.avg, 0),
      deepSel: sel.reduce((s, i) => s + i.deep, 0),
      avgSel: sel.reduce((s, i) => s + i.avg, 0),
    };
  });
  return out;
}

      ` : ''}

  } else if (m.type === 'full') {
    const isAdd = m.itemId == null;
    const item = isAdd ? null : state.items.find(i => i.id === m.itemId);
    if (!isAdd && !item) { state.modal = null; renderModal(); return; }
    const def = !isAdd ? DEFAULT_ITEMS.find(d => d.id === item.id) : null;
    const edited = !isAdd && isItemEdited(item);

    modalHtml = `
      <div class="modal-header">
        ${icon(isAdd ? 'plus' : 'pencil', 20)}
        <div class="modal-title">${isAdd ? 'เพิ่มรายการใหม่' : 'แก้ไขรายการ'}</div>
      </div>
      <div class="modal-subtitle">${isAdd ? CAT_META[m.cat].label : CAT_META[item.cat].label}</div>

      <div class="modal-field">
        <label class="modal-label">${icon('tag', 12)} ชื่อรายการ</label>
        <input type="text" class="modal-input" id="edit-name"
          value="${isAdd ? '' : esc(item.name)}" placeholder="เช่น หม้อหุงข้าว">
      </div>

      <div class="two-fields">
        <div class="modal-field">
          <label class="modal-label deep">${icon('flame', 12)} ราคา Deep</label>
          <input type="number" class="modal-input price-input deep" id="edit-deep"
            value="${isAdd ? '' : item.deep}" placeholder="0" inputmode="numeric">
        </div>
        <div class="modal-field">
          <label class="modal-label avg">${icon('chart', 12)} ราคา Avg</label>
          <input type="number" class="modal-input price-input avg" id="edit-avg"
            value="${isAdd ? '' : item.avg}" placeholder="0" inputmode="numeric">
        </div>
      </div>

      <div class="modal-field">
        <label class="modal-label">${icon('info', 12)} หมายเหตุ (ไม่บังคับ)</label>
        <input type="text" class="modal-input" id="edit-note"
          value="${isAdd ? '' : esc(item.note || '')}" placeholder="รายละเอียดเพิ่มเติม">
      </div>

      <div class="modal-buttons">
        <button class="modal-btn cancel" onclick="closeModal()">${icon('x', 14)} ยกเลิก</button>
        <button class="modal-btn save" onclick="saveModal()">${icon('check', 14)} ${isAdd ? 'เพิ่ม' : 'บันทึก'}</button>
      </div>

      ${edited && def ? `
        <button class="modal-btn reset" onclick="resetPriceInForm()">${icon('rotate', 12)} คืนค่าเดิม</button>
      ` : ''}

      ${!isAdd ? `
        <button class="modal-btn delete" onclick="deleteItemFromModal()">${icon('trash', 12)} ลบรายการนี้</button>
      ` : ''}
    `;
  }

  container.classList.add("open");
  container.innerHTML = `
    <div class="modal-bg" id="modal-bg" onclick="handleModalBgClick(event)">
      <div class="modal" onclick="event.stopPropagation()">${modalHtml}</div>
    </div>
  `;

  if (m.type === 'full' && m.itemId == null) {
    setTimeout(() => { const el = document.getElementById('edit-name'); if (el) el.focus(); }, 100);
  }
}

// RENDER MAIN
// ═══════════════════════════════════════════════════════════════════
function renderApp() {
  if (state.tab === 'history') {
    renderHistoryTab();
  } else {
    renderShopTab();
  }
}

function renderHeader() {
  const historyCount = state.purchases.reduce((s, p) => s + p.items.length, 0);
  return `
  <div class="header">
    <div class="brand-row">
      <div class="brand">shopping<span class="soft"> tracker</span></div>
      <div class="controls">
        <span id="save-status" class="save-status">${icon('check', 12)} บันทึก</span>
        <button class="reset-btn" onclick="exportData()" title="สำรองข้อมูล">${icon('download', 12)} สำรอง</button>
        <button class="reset-btn" onclick="triggerImport()" title="กู้คืนข้อมูล">${icon('upload', 12)} กู้คืน</button>
        <button class="reset-btn" onclick="resetAll()" title="รีเซ็ต" style="color: var(--coral)">${icon('refresh', 12)}</button>
      </div>
    </div>

    <div class="tabs">
      <button class="tab ${state.tab==='shop'?'active':''}" onclick="setTab('shop')">
        ${icon('bag', 14)} ยังไม่ซื้อ
      </button>
      <button class="tab ${state.tab==='history'?'active':''}" onclick="setTab('history')">
        ${icon('package', 14)} ซื้อแล้ว
        ${historyCount > 0 ? `<span class="tab-badge num">${historyCount}</span>` : ''}
      </button>
    </div>
  </div>
  `;
}

function renderShopTab() {
  const { shopSpend, fixedTotal, totalSpend, remaining } = compute();
  const ct = catTotals();

  const segments = [];
  state.fixed.forEach(f => segments.push({ amount: f.amount, color: f.color }));
  if (state.savings > 0) segments.push({ amount: state.savings, color: "#a595c4" });
  if (state.emergency > 0) segments.push({ amount: state.emergency, color: "#8ca7c9" });
  if (shopSpend > 0) segments.push({ amount: shopSpend, color: "#8fa886" });

  const remainClass = remaining >= 0 ? "pos" : "neg";
  const remainColor = remaining >= 0 ? "v-sage" : "v-coral";

  // header
  let html = renderHeader();

  // summary cards + mode toggle
  html += `
  <div class="header" style="position: static; padding-top: 0; padding-bottom: 14px; border-top: none;">
    <div class="mode-toggle">
      <button class="mode-btn deep ${state.priceMode==='deep'?'active':''}" onclick="setMode('deep')">
        ${icon('flame', 13)} ราคา Deep
      </button>
      <button class="mode-btn avg ${state.priceMode==='avg'?'active':''}" onclick="setMode('avg')">
        ${icon('chart', 13)} ราคา Avg
      </button>
    </div>

    <div class="summary-grid">
      <div class="summary-card">
        <div class="summary-label">${icon('bag', 11)} เลือก</div>

      </div>
      <div class="summary-card">
        <div class="summary-label">${icon('trending', 11)} รวมจ่าย</div>

        <div class="summary-sub">จาก ฿${fmt(state.salary)}</div>
      </div>
    </div>
  </div>
  `;

  // budget planner
  html += `
  <div class="card card-pad">
    <div class="section-title">${icon('wallet', 17)} วางแผนงบประมาณ</div>

    <div class="salary-box">
      <div class="salary-icon-box">${icon('wallet', 20)}</div>
      <div class="salary-main">
        <div class="salary-label">เงินเดือน</div>
        ${state.editingSalary ? `
          <input type="number" class="salary-input num" id="salary-input" value="${state.salary}" inputmode="numeric"
            onblur="setSalary(this.value); toggleSalaryEdit()"

        ` : `
          <div class="salary-value num">฿${fmt(state.salary)}</div>
        `}
      </div>
      ${state.editingSalary ? '' : `
        <button class="salary-edit-btn" onclick="toggleSalaryEdit()">${icon('pencil', 11)} แก้ไข</button>
      `}
    </div>

    <div class="budget-info">
      <span>รวมจ่าย <span class="v num" style="color:var(--coral)">${fmt(totalSpend)}฿</span></span>
      <span style="color:var(--text-faint)">·</span>
      <span>คงเหลือ <span class="v num" style="color:${remaining>=0?'var(--sage)':'var(--coral)'}">${fmt(remaining)}฿</span></span>
    </div>

    <div class="bar">
      ${segments.map(s => {
        const pct = state.salary > 0 ? Math.max(0.5, (s.amount / state.salary) * 100) : 0;

          onchange="setSavings(this.value)">

        <div class="field-label" style="color:var(--blue)">${icon('shield', 11)} สำรองฉุกเฉิน</div>

        </div>

          </div>

      ${isEditing ? `
        <div class="edit-banner">
          ${icon('pencil', 12)} แตะรายการเพื่อแก้ไข · แก้ชื่อ ราคา หรือลบได้

      ` : ''}

      <div class="items">
        ${items.length === 0 ? `
          <div style="padding: 20px; text-align: center; color: var(--text-faint); font-size: 13px; font-weight: 300;">
            ${state.purchases.some(p => p.items.some(i => i.cat === cat))
              ? 'ไม่มีรายการที่ยังไม่ซื้อในหมวดนี้ · ดูที่แท็บซื้อแล้ว'

              ${item.note ? `<div class="item-note">${esc(item.note)}</div>` : ''}

            <div class="item-right">
              <div class="item-price ${edited?'edited':''}" onclick="openPriceEdit(${item.id}, event)">

              </div>

  html += `
  <div class="card card-pad">
    <div class="section-title">${icon('list', 17)} สรุปทั้งหมด</div>
    <table class="sum-table">
      <tr>
        <td class="label">${icon('wallet', 14)} เงินเดือน</td>
        <td class="num">฿${fmt(state.salary)}</td>
      </tr>
      <tr>
        <td class="label">${icon('receipt', 14)} ค่าใช้จ่ายประจำ (${state.fixed.length} รายการ)</td>

      ` : ''}
      <tr>
        <td class="label">${icon('bag', 14)} ของที่เลือก (${state.selected.length} ชิ้น) · ${state.priceMode}</td>
        <td class="num" style="color:var(--sage)">−฿${fmt(shopSpend)}</td>
      </tr>
      <tr class="total-row">
        <td class="label">${icon('sparkle', 15)} เงินคงเหลือสุทธิ</td>
        <td class="num ${remainClass}">฿${fmt(remaining)}</td>
      </tr>
    </table>

    <div class="info-box">
      <div class="info-title">${icon('chart', 12)} ถ้าเลือกของทุกอย่าง</div>
      <div class="row">
        <span>Deep ทั้งหมด</span>
        <span class="v num" style="color:var(--coral)">฿${fmt(allDeep)}</span>
      </div>
      <div class="row">
        <span>Avg ทั้งหมด</span>
        <span class="v num" style="color:var(--blue)">฿${fmt(allAvg)}</span>
      </div>
      ${allDeep > state.salary ? `
        <div class="italic">รวมเกินเงินเดือน — ควรทยอยซื้อตามลำดับความสำคัญ</div>
      ` : ''}
    </div>
  </div>

  <div class="footer">
    บันทึกในเครื่องอัตโนมัติ · ข้อมูลของแต่ละคนแยกกัน ไม่ข้ามเครื่อง<br>
    แชร์ไฟล์นี้ให้เพื่อนได้เลย ทุกคนมีข้อมูลของตัวเอง
  </div>
  `;

  document.getElementById("app").innerHTML = html;
  if (state.editingSalary) {
    const si = document.getElementById("salary-input");
    if (si) { si.focus(); si.select(); }
  }
}

function renderBreakdown(fixedTotal, shopSpend, totalSpend) {
  // breakdown: fixed | savings | emergency | shop items
  const parts = [
    { label: 'ค่าใช้จ่ายจำเป็น', desc: `${state.fixed.length} รายการ`, amount: fixedTotal, color: 'var(--coral)', bg: 'var(--coral-surface)', iconName: 'receipt' },
    { label: 'ออมเงิน', desc: 'เงินออม', amount: state.savings, color: 'var(--purple)', bg: 'var(--purple-surface)', iconName: 'heart' },
    { label: 'สำรองฉุกเฉิน', desc: 'กันไว้เผื่อฉุกเฉิน', amount: state.emergency, color: 'var(--blue)', bg: 'var(--blue-surface)', iconName: 'shield' },
    { label: 'ของที่เลือกซื้อ', desc: `${state.selected.length} ชิ้น · ราคา ${state.priceMode}`, amount: shopSpend, color: 'var(--sage)', bg: 'var(--sage-surface)', iconName: 'bag' },
  ].filter(p => p.amount > 0);

  if (parts.length === 0 || totalSpend === 0) return '';

  // find biggest
  const maxAmount = Math.max(...parts.map(p => p.amount));

  return `
  <div class="card card-pad">
    <div class="section-title">${icon('piechart', 17)} สัดส่วนค่าใช้จ่าย</div>
    <div style="font-size: 12px; color: var(--text-soft); margin-bottom: 14px; font-weight: 300;">
      รวมทั้งหมด <span style="color: var(--text); font-weight: 700;" class="num">฿${fmt(totalSpend)}</span> จากเงินเดือน <span class="num">฿${fmt(state.salary)}</span>
      ${state.salary > 0 ? ` (${Math.round((totalSpend/state.salary)*100)}%)` : ''}
    </div>

    <div class="breakdown">
      ${parts.map(p => {
        const pct = totalSpend > 0 ? Math.round((p.amount / totalSpend) * 100) : 0;
        const salaryPct = state.salary > 0 ? Math.round((p.amount / state.salary) * 100) : 0;
        const isBiggest = p.amount === maxAmount && parts.length > 1;
        return `
          <div class="breakdown-item">
            <div class="breakdown-icon" style="background:${p.bg}; color:${p.color}">
              ${icon(p.iconName, 16)}
            </div>
            <div class="breakdown-bar-wrap">
              <div class="breakdown-top">
                <div class="breakdown-label">
                  ${esc(p.label)}
                  ${isBiggest ? `<span class="biggest-chip">${icon('flame', 10)} สูงสุด</span>` : ''}
                </div>
                <div class="breakdown-amount num">฿${fmt(p.amount)}</div>
              </div>
              <div class="breakdown-bar">
                <div class="breakdown-fill" style="width:${pct}%;background:${p.color}"></div>
              </div>
              <div class="breakdown-percent">
                <span style="color:${p.color}; font-weight: 600">${pct}%</span> ของค่าใช้จ่ายรวม
                · <span class="num">${salaryPct}%</span> ของเงินเดือน
                <span style="color:var(--text-faint); margin-left: 4px;">· ${p.desc}</span>
              </div>
            </div>
          </div>
        `;
      }).join('')}
    </div>
  </div>
  `;
}

function renderHistoryTab() {
  let html = renderHeader();

  if (state.purchases.length === 0) {
    html += `
    <div class="history-empty">
      <div class="history-empty-icon">${icon('package', 28)}</div>
      <div class="history-empty-title">ยังไม่มีประวัติการซื้อ</div>
      <div class="history-empty-desc">
        เมื่อกดปุ่ม "ซื้อสินค้าที่เลือก" ในแท็บ "ยังไม่ซื้อ"<br>
        รายการจะถูกบันทึกไว้ที่นี่พร้อมวันเวลา
      </div>
    </div>
    `;
    document.getElementById("app").innerHTML = html;
    return;
  }

  // summary
  const totalBought = state.purchases.reduce((s, p) => s + p.items.reduce((ss, i) => ss + i.price, 0), 0);
  const totalCount = state.purchases.reduce((s, p) => s + p.items.length, 0);

  html += `
  <div class="card card-pad" style="margin-top: 14px;">
    <div class="section-title">${icon('package', 17)} ประวัติการซื้อ</div>
    <div class="summary-grid">
      <div class="summary-card">
        <div class="summary-label">${icon('package', 11)} รวม</div>
        <div class="summary-value num" style="color: var(--purple)">${totalCount}</div>
        <div class="summary-sub">ชิ้น</div>
      </div>
      <div class="summary-card" style="grid-column: span 2">
        <div class="summary-label">${icon('wallet', 11)} ใช้ไปทั้งสิ้น</div>
        <div class="summary-value num" style="color: var(--coral)">฿${fmt(totalBought)}</div>
        <div class="summary-sub">${state.purchases.length} ครั้ง</div>
      </div>
    </div>
  </div>
  `;

  // each batch
  state.purchases.forEach(batch => {
    const total = batch.items.reduce((s, i) => s + i.price, 0);
    html += `
    <div class="history-batch">
      <div class="batch-header">
        <div class="batch-header-top">
          <div>
            <div class="batch-date">
              ${icon('clock', 14)} ${formatDate(batch.date)}
            </div>
            <div class="batch-time">${formatTime(batch.date)} · ราคา ${batch.priceMode === 'deep' ? 'Deep' : 'Avg'}</div>
          </div>
          <button class="batch-restore-all" onclick="restoreBatch('${batch.id}')">
            ${icon('arrowLeft', 11)} ย้อนคืนทั้งหมด
          </button>
        </div>
        <div class="batch-stats">
          <span><span class="v num">${batch.items.length}</span> ชิ้น</span>
          <span>รวม <span class="v num" style="color: var(--sage)">฿${fmt(total)}</span></span>
        </div>
      </div>
      <div>
        ${batch.items.map(it => `
          <div class="history-item">
            <div class="history-item-main">
              <div class="history-item-name">${esc(it.name)}</div>
              ${it.note ? `<div class="history-item-note">${esc(it.note)}</div>` : ''}
            </div>
            <div style="text-align: right;">
              <div class="history-item-price num">฿${fmt(it.price)}</div>
              <div class="history-item-mode">${CAT_META[it.cat].label}</div>
            </div>
            <button class="restore-btn" onclick="restoreOneItem('${batch.id}', ${it.originalId})">
              ${icon('arrowLeft', 11)} ยังไม่ซื้อ
            </button>
          </div>
        `).join('')}
      </div>
    </div>
    `;
  });

  html += `
  <div class="footer">
    กด "ย้อนคืน" เพื่อย้ายรายการกลับไปที่แท็บ "ยังไม่ซื้อ"
  </div>
  `;

  document.getElementById("app").innerHTML = html;
}

// INIT
load(); renderApp(); renderModal();
</script>

</body>
</html>
